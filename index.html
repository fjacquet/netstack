<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetStack</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Dell Leaf-Spine network sizing calculator for SONiC deployments" />
    <!-- manifest injected by vite-plugin-pwa -->
    <script>
      // Prevent flash-of-wrong-theme: apply dark/light class before React renders
      (function() {
        var t = localStorage.getItem('netstack-theme');
        var d = document.documentElement;
        if (t === 'dark') { d.classList.add('dark'); }
        else if (t === 'light') { d.classList.add('light'); }
        else { // 'system' or not set
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            d.classList.add('dark');
          } else {
            d.classList.add('light');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
